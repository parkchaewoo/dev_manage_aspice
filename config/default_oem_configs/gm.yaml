oem_name: "General Motors (GM)"
description: "GM-specific ASPICE configuration. Aligned with GM Global Product Development Process (GPDP), GM Global Requirements, and GM-specific quality standards."

phases: ["DV", "PV", "PP", "MP"]

stages:
  SWE.1:
    enabled: true
    display_name: "Software Requirements Analysis"
    display_name_ko: "소프트웨어 요구사항 분석"
    required_documents:
      - name: "Software Requirements Specification"
        template_id: "srs"
        description: "SRS per GM Global SRS template. Derived from GM CTQ (Critical to Quality) and system-level TRS."
    checklist:
      - "All GM TRS/SSTS items are allocated to software requirements"
      - "CTQ (Critical to Quality) characteristics are identified and flagged"
      - "Diagnostic requirements per GM GDS (Global Diagnostic Specification) are included"
      - "Safety requirements per GM ASIL classification and safety plan are identified"

  SWE.2:
    enabled: true
    display_name: "Software Architectural Design"
    display_name_ko: "소프트웨어 아키텍처 설계"
    required_documents:
      - name: "Software Architecture Design"
        template_id: "sad"
        description: "Architecture per GM Global Electrical Architecture (GEA) and AUTOSAR platform guidelines."
    checklist:
      - "Architecture aligns with GM Global Electrical Architecture (GEA) platform"
      - "AUTOSAR software component partitioning follows GM platform standard"
      - "GMLAN/CAN-FD/Ethernet interfaces are specified per GM signal database"
      - "Memory and CPU budgets fit GM ECU platform resource allocation"

  SWE.3:
    enabled: true
    display_name: "Software Detailed Design and Unit Construction"
    display_name_ko: "소프트웨어 상세 설계 및 유닛 구현"
    required_documents:
      - name: "Software Detailed Design"
        template_id: "sdd"
        description: "Detailed design per GM Global template. Includes control algorithm and calibration parameter documentation."
    checklist:
      - "Detailed design follows GM Global SDD template"
      - "MISRA-C:2012 compliance per GM mandatory rule set is verified"
      - "Static analysis per GM approved tool chain is completed with no critical findings"
      - "Code review per GM Global peer review checklist is performed"

  SWE.4:
    enabled: true
    display_name: "Software Unit Verification"
    display_name_ko: "소프트웨어 유닛 검증"
    required_documents:
      - name: "Unit Test Report"
        template_id: "ut_report"
        description: "Unit test results with coverage metrics per GM quality gate criteria."
    checklist:
      - "Unit test plan meets GM Global coverage targets: statement >= 80%, branch >= 75%"
      - "CTQ-critical units achieve MC/DC coverage per GM safety requirements"
      - "Equivalence partitioning and boundary analysis per GM methodology are applied"
      - "Test environment uses GM approved tool chain (VectorCAST, Tessy, or equivalent)"

  SWE.5:
    enabled: true
    display_name: "Software Integration and Integration Test"
    display_name_ko: "소프트웨어 통합 및 통합 테스트"
    required_documents:
      - name: "Integration Test Report"
        template_id: "it_report"
        description: "Integration test results per GM GPDP milestone criteria."
    checklist:
      - "Integration follows GM Global incremental build strategy"
      - "GMLAN/CAN-FD/Ethernet message integration verified per GM signal database"
      - "AUTOSAR RTE and BSW integration passes GM platform validation suite"
      - "Resource consumption after integration meets GM ECU platform budget"

  SWE.6:
    enabled: true
    display_name: "Software Qualification Test"
    display_name_ko: "소프트웨어 적격성 테스트"
    required_documents:
      - name: "Qualification Test Report"
        template_id: "qt_report"
        description: "Qualification results per GM Global release gate acceptance criteria."
    checklist:
      - "All SRS requirements are covered by qualification test cases"
      - "Functional qualification per GM SSTS acceptance criteria is passed"
      - "Non-functional qualification (performance, durability) per GM KPI targets is passed"
      - "GM PPAP/GPDP release gate criteria checklist is fully satisfied"

traceability_rules:
  - source_stage: "SWE.1"
    target_stage: "SWE.2"
    link_type: "is_designed_by"
    description: "SRS requirements traced to architecture elements per GM Global traceability standard."

  - source_stage: "SWE.2"
    target_stage: "SWE.3"
    link_type: "is_detailed_by"
    description: "Architecture components mapped to detailed design modules per GM naming convention."

  - source_stage: "SWE.3"
    target_stage: "SWE.4"
    link_type: "is_verified_by"
    description: "Each detailed design unit verified by unit test cases per GM coverage targets."

  - source_stage: "SWE.2"
    target_stage: "SWE.5"
    link_type: "is_verified_by"
    description: "Architecture interfaces verified by integration tests per GM GPDP milestones."

  - source_stage: "SWE.1"
    target_stage: "SWE.6"
    link_type: "is_validated_by"
    description: "All SRS requirements validated by qualification tests per GM PPAP release criteria."

  - source_stage: "SWE.6"
    target_stage: "SWE.1"
    link_type: "verifies"
    description: "Qualification test results confirm fulfillment of all GM software requirements."

  - source_stage: "SWE.5"
    target_stage: "SWE.2"
    link_type: "verifies"
    description: "Integration test results confirm correct interaction of architectural components."

  - source_stage: "SWE.4"
    target_stage: "SWE.3"
    link_type: "verifies"
    description: "Unit test results confirm detailed design unit correctness."
