oem_name: "HKMC (Hyundai Kia Motor Company / 현대기아자동차)"
description: "HKMC-specific ASPICE configuration. Aligned with Hyundai-Kia development standards, Korean document naming conventions, and steering system ECU focus."

phases: ["Mcar", "P1", "P2", "Pilot", "SOP"]

stages:
  SWE.1:
    enabled: true
    display_name: "Software Requirements Analysis"
    display_name_ko: "소프트웨어 요구사항 분석"
    required_documents:
      - name: "Software Requirements Specification"
        template_id: "srs"
        description: "HKMC format SRS. Includes steering torque, angle sensor, and EPS control requirements."
    checklist:
      - "All HKMC system specification items are traced to SW requirements"
      - "EPS diagnostic requirements per HKMC DTC specification are included"
      - "CAN/LIN communication matrix requirements align with HKMC signal database"
      - "Safety requirements (ASIL rating) per HKMC safety concept are identified"

  SWE.2:
    enabled: true
    display_name: "Software Architectural Design"
    display_name_ko: "소프트웨어 아키텍처 설계"
    required_documents:
      - name: "Software Architecture Design"
        template_id: "sad"
        description: "Architecture for EPS/MDPS software. Includes AUTOSAR layer mapping per HKMC platform standard."
    checklist:
      - "Architecture follows HKMC AUTOSAR platform standard"
      - "MDPS/C-MDPS/R-MDPS variant handling architecture is defined"
      - "Fail-safe architecture for steering assist loss is specified"
      - "Resource budgets meet HKMC MCU platform limits"

  SWE.3:
    enabled: true
    display_name: "Software Detailed Design and Unit Construction"
    display_name_ko: "소프트웨어 상세 설계 및 유닛 구현"
    required_documents:
      - name: "Software Detailed Design"
        template_id: "sdd"
        description: "Detailed design per HKMC template. Includes control algorithm detail for EPS torque/angle control."
    checklist:
      - "Detailed design follows HKMC modeling/coding guidelines"
      - "MISRA-C:2012 mandatory and required rules compliance is verified"
      - "Static analysis findings are resolved per HKMC severity criteria"
      - "Unit naming follows HKMC module naming convention"

  SWE.4:
    enabled: true
    display_name: "Software Unit Verification"
    display_name_ko: "소프트웨어 유닛 검증"
    required_documents:
      - name: "Unit Test Report"
        template_id: "ut_report"
        description: "Test execution results with MC/DC coverage for safety-critical steering modules."
    checklist:
      - "Unit test plan meets HKMC coverage criteria: statement >= 80%, branch >= 70%"
      - "Safety-critical steering units achieve MC/DC coverage per HKMC ASIL requirement"
      - "Torque control algorithm boundary conditions are tested"
      - "Test environment matches HKMC approved tool chain"

  SWE.5:
    enabled: true
    display_name: "Software Integration and Integration Test"
    display_name_ko: "소프트웨어 통합 및 통합 테스트"
    required_documents:
      - name: "Integration Test Report"
        template_id: "it_report"
        description: "Results of SIL/HIL integration testing per HKMC integration criteria."
    checklist:
      - "Integration follows HKMC build sequence for AUTOSAR stack"
      - "CAN/LIN message integration is verified against HKMC signal database"
      - "Steering control + diagnostics integration is tested on HIL"
      - "Memory map after integration fits HKMC MCU resource limits"

  SWE.6:
    enabled: true
    display_name: "Software Qualification Test"
    display_name_ko: "소프트웨어 적격성 테스트"
    required_documents:
      - name: "Qualification Test Report"
        template_id: "qt_report"
        description: "Full qualification results including HKMC acceptance criteria for steering ECU."
    checklist:
      - "All HKMC SW requirements are covered by qualification tests"
      - "Steering system functional tests pass on target ECU hardware"
      - "Diagnostic qualification per HKMC DTC specification is complete"
      - "HKMC release gate criteria checklist is fully satisfied"

traceability_rules:
  - source_stage: "SWE.1"
    target_stage: "SWE.2"
    link_type: "is_designed_by"
    description: "HKMC system specification items traced through SRS to architecture elements."

  - source_stage: "SWE.2"
    target_stage: "SWE.3"
    link_type: "is_detailed_by"
    description: "Architecture components mapped to detailed design modules per HKMC naming convention."

  - source_stage: "SWE.3"
    target_stage: "SWE.4"
    link_type: "is_verified_by"
    description: "Each detailed design unit has corresponding unit test cases with HKMC coverage targets."

  - source_stage: "SWE.2"
    target_stage: "SWE.5"
    link_type: "is_verified_by"
    description: "Architecture interfaces verified by integration tests on HKMC HIL bench."

  - source_stage: "SWE.1"
    target_stage: "SWE.6"
    link_type: "is_validated_by"
    description: "All SRS requirements validated by qualification tests per HKMC release gate."

  - source_stage: "SWE.6"
    target_stage: "SWE.1"
    link_type: "verifies"
    description: "Qualification test results confirm fulfillment of all HKMC software requirements."

  - source_stage: "SWE.5"
    target_stage: "SWE.2"
    link_type: "verifies"
    description: "Integration test results confirm correct interaction of architectural components."

  - source_stage: "SWE.4"
    target_stage: "SWE.3"
    link_type: "verifies"
    description: "Unit test results confirm detailed design correctness for steering control modules."
