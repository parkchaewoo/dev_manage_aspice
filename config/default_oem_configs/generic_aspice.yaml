oem_name: "Generic ASPICE"
description: "Generic Automotive SPICE template covering all SWE.1 through SWE.6 process areas. Suitable as a baseline for any OEM or Tier-1 supplier."

phases: ["Phase 1", "Phase 2", "Phase 3"]

stages:
  SWE.1:
    enabled: true
    display_name: "Software Requirements Analysis"
    display_name_ko: "소프트웨어 요구사항 분석"
    required_documents:
      - name: "Software Requirements Specification"
        template_id: "srs"
        description: "Complete specification of software functional and non-functional requirements derived from system requirements."
    checklist:
      - "All system requirements have been allocated to software requirements"
      - "Each software requirement is uniquely identified and versioned"
      - "Non-functional requirements (timing, memory, safety) are quantified"
      - "Requirements are reviewed for consistency and completeness"

  SWE.2:
    enabled: true
    display_name: "Software Architectural Design"
    display_name_ko: "소프트웨어 아키텍처 설계"
    required_documents:
      - name: "Software Architecture Design"
        template_id: "sad"
        description: "High-level design describing software components, their interfaces, and interactions."
    checklist:
      - "Software architecture is derived from software requirements"
      - "All software components are identified and described"
      - "Component interfaces are fully specified"
      - "Architecture supports required safety and security levels"

  SWE.3:
    enabled: true
    display_name: "Software Detailed Design and Unit Construction"
    display_name_ko: "소프트웨어 상세 설계 및 유닛 구현"
    required_documents:
      - name: "Software Detailed Design"
        template_id: "sdd"
        description: "Detailed design of each software unit including algorithms, data structures, and logic."
    checklist:
      - "Detailed design is derived from the software architecture"
      - "Each software unit is specified with its interfaces and behavior"
      - "Coding guidelines are defined and applied"
      - "Static analysis is performed with no critical findings"

  SWE.4:
    enabled: true
    display_name: "Software Unit Verification"
    display_name_ko: "소프트웨어 유닛 검증"
    required_documents:
      - name: "Unit Test Report"
        template_id: "ut_report"
        description: "Results of unit testing including coverage metrics and defect summary."
    checklist:
      - "Unit test plan is defined and reviewed"
      - "Test cases cover all detailed design elements"
      - "Statement and branch coverage targets are met"
      - "All test results are recorded and traceable"

  SWE.5:
    enabled: true
    display_name: "Software Integration and Integration Test"
    display_name_ko: "소프트웨어 통합 및 통합 테스트"
    required_documents:
      - name: "Integration Test Report"
        template_id: "it_report"
        description: "Results of integration testing including interface verification."
    checklist:
      - "Integration strategy and build order are defined"
      - "Integration test cases verify component interfaces"
      - "Data flow across component boundaries is tested"
      - "All integration test results are recorded"

  SWE.6:
    enabled: true
    display_name: "Software Qualification Test"
    display_name_ko: "소프트웨어 적격성 테스트"
    required_documents:
      - name: "Qualification Test Report"
        template_id: "qt_report"
        description: "Results of qualification testing demonstrating requirement compliance."
    checklist:
      - "Qualification test plan covers all software requirements"
      - "Test environment matches target or is representative"
      - "Functional requirements are verified by test cases"
      - "Non-functional requirements (performance, robustness) are verified"

traceability_rules:
  - source_stage: "SWE.1"
    target_stage: "SWE.2"
    link_type: "is_designed_by"
    description: "Each software requirement shall be traceable to at least one architectural element."

  - source_stage: "SWE.2"
    target_stage: "SWE.3"
    link_type: "is_detailed_by"
    description: "Each architectural component shall be traceable to detailed design units."

  - source_stage: "SWE.3"
    target_stage: "SWE.4"
    link_type: "is_verified_by"
    description: "Each detailed design unit shall be verified by at least one unit test case."

  - source_stage: "SWE.2"
    target_stage: "SWE.5"
    link_type: "is_verified_by"
    description: "Each architectural interface shall be verified by at least one integration test case."

  - source_stage: "SWE.1"
    target_stage: "SWE.6"
    link_type: "is_validated_by"
    description: "Each software requirement shall be validated by at least one qualification test case."

  - source_stage: "SWE.6"
    target_stage: "SWE.1"
    link_type: "verifies"
    description: "Qualification test results confirm that all software requirements are fulfilled."

  - source_stage: "SWE.5"
    target_stage: "SWE.2"
    link_type: "verifies"
    description: "Integration test results confirm that architectural interfaces work as designed."

  - source_stage: "SWE.4"
    target_stage: "SWE.3"
    link_type: "verifies"
    description: "Unit test results confirm that detailed design units behave as specified."
