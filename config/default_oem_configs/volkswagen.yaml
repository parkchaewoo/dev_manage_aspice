oem_name: "Volkswagen Group (Volkswagen AG)"
description: "Volkswagen Group ASPICE configuration. Aligned with VW group standards (KPM, KGAS, QTR), German/English naming conventions, and VW group-specific process requirements."

phases: ["A-Muster", "B-Muster", "C-Muster", "SOP"]

stages:
  SWE.1:
    enabled: true
    display_name: "Software Requirements Analysis"
    display_name_ko: "소프트웨어 요구사항 분석"
    required_documents:
      - name: "Software Requirements Specification"
        template_id: "srs"
        description: "Lastenheft (LH) for software requirements per VW group template. Derived from System-Lastenheft."
    checklist:
      - "All System-Lastenheft items are allocated to SW-Lastenheft requirements"
      - "KPM (Key Performance Metrics) are defined for critical functions"
      - "Diagnostic requirements per VW ODX/OTX standards are specified"
      - "Requirements are reviewed per VW QTR (Quality Task Review) process"

  SWE.2:
    enabled: true
    display_name: "Software Architectural Design"
    display_name_ko: "소프트웨어 아키텍처 설계"
    required_documents:
      - name: "Software Architecture Design"
        template_id: "sad"
        description: "Architecture document per VW group template. Includes AUTOSAR architecture mapping for VW MEB/MQB platforms."
    checklist:
      - "Architecture follows VW group AUTOSAR platform standard"
      - "Architecture supports VW group variant management (Variantenmanagement)"
      - "Schnittstellen (interfaces) are specified per VW CAN/LIN/FlexRay/Ethernet matrix"
      - "Memory and CPU budgets fit VW group ECU platform constraints"

  SWE.3:
    enabled: true
    display_name: "Software Detailed Design and Unit Construction"
    display_name_ko: "소프트웨어 상세 설계 및 유닛 구현"
    required_documents:
      - name: "Software Detailed Design"
        template_id: "sdd"
        description: "Detailed design (Feinentwurf) per VW group template. Includes Simulink model documentation."
    checklist:
      - "Detailed design (Feinentwurf) follows VW group template and guidelines"
      - "Simulink models comply with VW group MAAB modeling guidelines"
      - "MISRA-C:2012 compliance per VW group mandatory rule set is verified"
      - "Static analysis tool chain per VW group standard is applied"

  SWE.4:
    enabled: true
    display_name: "Software Unit Verification"
    display_name_ko: "소프트웨어 유닛 검증"
    required_documents:
      - name: "Unit Test Report"
        template_id: "ut_report"
        description: "Unit test report with coverage metrics per VW group quality gate criteria."
    checklist:
      - "Unit test plan (Einzeltest-Plan) meets VW group coverage targets"
      - "Statement coverage >= 80%, branch coverage >= 70% per VW group standard"
      - "Safety-critical units achieve MC/DC per VW ASIL requirement"
      - "Test environment matches VW group approved tool chain (Tessy, VectorCAST)"

  SWE.5:
    enabled: true
    display_name: "Software Integration and Integration Test"
    display_name_ko: "소프트웨어 통합 및 통합 테스트"
    required_documents:
      - name: "Integration Test Report"
        template_id: "it_report"
        description: "Integration test results per VW group KGAS milestones."
    checklist:
      - "Integration follows VW group Integrations-Aufbauplan"
      - "CAN/LIN/FlexRay/Ethernet integration verified per VW Kommunikationsmatrix"
      - "AUTOSAR RTE integration passes VW group platform test suite"
      - "Resource consumption after integration meets VW group ECU budget"

  SWE.6:
    enabled: true
    display_name: "Software Qualification Test"
    display_name_ko: "소프트웨어 적격성 테스트"
    required_documents:
      - name: "Qualification Test Report"
        template_id: "qt_report"
        description: "Qualification results per VW group Freigabe process."
    checklist:
      - "All SW-Lastenheft requirements are covered by qualification tests"
      - "Functional tests per VW group Pflichtenheft are passed"
      - "Non-functional tests (performance, robustness) per VW KPM are passed"
      - "VW group Freigabe criteria (release gate) checklist is fully satisfied"

traceability_rules:
  - source_stage: "SWE.1"
    target_stage: "SWE.2"
    link_type: "is_designed_by"
    description: "SW-Lastenheft requirements traced to Architektur-Beschreibung elements per VW traceability standard."

  - source_stage: "SWE.2"
    target_stage: "SWE.3"
    link_type: "is_detailed_by"
    description: "Architecture components mapped to Feinentwurf modules per VW Namenskonvention."

  - source_stage: "SWE.3"
    target_stage: "SWE.4"
    link_type: "is_verified_by"
    description: "Each Feinentwurf unit verified by Einzeltest cases per VW coverage targets."

  - source_stage: "SWE.2"
    target_stage: "SWE.5"
    link_type: "is_verified_by"
    description: "Architecture interfaces verified by Integrationstest per VW KGAS milestones."

  - source_stage: "SWE.1"
    target_stage: "SWE.6"
    link_type: "is_validated_by"
    description: "All SW-Lastenheft requirements validated by Qualifikationstest per VW Freigabe process."

  - source_stage: "SWE.6"
    target_stage: "SWE.1"
    link_type: "verifies"
    description: "Qualifikationstest results confirm fulfillment of all SW-Lastenheft requirements."

  - source_stage: "SWE.5"
    target_stage: "SWE.2"
    link_type: "verifies"
    description: "Integrationstest results confirm correct interaction of Architektur components."

  - source_stage: "SWE.4"
    target_stage: "SWE.3"
    link_type: "verifies"
    description: "Einzeltest results confirm Feinentwurf unit correctness."
